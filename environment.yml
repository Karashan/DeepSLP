name: deepslp
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.13

  # Deep learning (GPU)
  - pytorch
  - pytorch-cuda=12.1

  # ML / data stack
  - scikit-learn
  - pandas
  - numpy
  - scipy
  - seaborn
  - matplotlib
  - plotly

  # Graph analysis
  - networkx

  # Baseline model
  - xgboost

  # Jupyter
  - ipykernel
