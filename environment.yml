name: deepslp
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.13

  # ML / data stack
  - scikit-learn
  - pandas
  - numpy
  - scipy
  - seaborn
  - matplotlib
  - plotly

  # Graph analysis
  - networkx

  # Baseline model
  - xgboost

  # Jupyter
  - ipykernel

  # Hyperparameter tuning
  - optuna

  # Utilities
  - joblib

  - pip:
      # PyTorch with CUDA 12.1 (pip only — conda builds lack GPU for py3.13)
      - torch==2.5.1+cu121
